<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晚情歌 · 深夜伤感音乐站</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景渐变光晕 -->
    <div class="bg-glow"></div>
    <div class="bg-particles" id="particles"></div>
    
    <!-- 主容器 -->
    <div class="container">
        <!-- 顶部导航 -->
        <header class="navbar">
            <div class="logo">
                <span class="logo-icon">♪</span>
                <span class="logo-text">晚情歌</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">推荐</a>
                <a href="#" class="nav-item">华语</a>
                <a href="#" class="nav-item">粤语</a>
                <a href="#" class="nav-item">经典</a>
                <a href="#" class="nav-item">治愈</a>
            </nav>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索歌曲 / 歌手...">
                <button class="search-btn">🔍</button>
            </div>
        </header>

        <!-- 主体区域 -->
        <main class="main-content">
            <!-- 左侧歌单列表 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3>伤感歌单</h3>
                    <span class="song-count" id="totalCount">0 首</span>
                </div>
                <div class="playlist-tabs">
                    <button class="tab-btn active" data-tab="all">综合</button>
                    <button class="tab-btn" data-tab="huayu">华语催泪</button>
                    <button class="tab-btn" data-tab="yueyu">粤语经典</button>
                    <button class="tab-btn" data-tab="classic">年代金曲</button>
                    <button class="tab-btn" data-tab="emo">深夜EMO</button>
                </div>
                <div class="playlist-container" id="playlist">
                    <!-- 歌曲列表JS自动渲染 -->
                </div>
            </aside>

            <!-- 中间播放器区域 -->
            <section class="player-section">
                <div class="album-wrapper">
                    <canvas class="visualizer-canvas" id="visualizer"></canvas>
                    <div class="album-cover" id="albumCover">
                        <img src="https://picsum.photos/seed/sad-default/400/400" alt="专辑封面" id="coverImg">
                        <div class="cover-glow"></div>
                    </div>
                </div>

                <div class="song-info">
                    <h1 class="song-title" id="songTitle">点击左侧歌曲开始播放</h1>
                    <p class="song-artist" id="songArtist">晚情歌 · 陪你度过深夜</p>
                </div>

                <!-- 进度条 -->
                <div class="progress-section">
                    <span class="time current-time" id="currentTime">00:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-handle" id="progressHandle"></div>
                    </div>
                    <span class="time total-time" id="totalTime">00:00</span>
                </div>

                <!-- 控制按钮 -->
                <div class="controls">
                    <button class="ctrl-btn mode-btn" id="modeBtn" title="列表循环">🔁</button>
                    <button class="ctrl-btn prev-btn" id="prevBtn" title="上一首">⏮</button>
                    <button class="ctrl-btn play-btn" id="playBtn" title="播放/暂停">▶</button>
                    <button class="ctrl-btn next-btn" id="nextBtn" title="下一首">⏭</button>
                    <button class="ctrl-btn volume-btn" id="volumeBtn" title="音量">🔊</button>
                </div>

                <!-- 音量滑块 -->
                <div class="volume-section">
                    <input type="range" id="volumeSlider" min="0" max="100" value="70" class="volume-slider">
                </div>
            </section>

            <!-- 右侧歌词面板 -->
            <aside class="info-panel">
                <div class="panel-tabs">
                    <button class="panel-tab active" data-panel="lyric">歌词</button>
                    <button class="panel-tab" data-panel="info">歌曲信息</button>
                    <button class="panel-tab" data-panel="similar">相似推荐</button>
                </div>
                <div class="panel-content" id="panelContent">
                    <div class="lyric-container">
                        <p class="lyric-placeholder">加载中...</p>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 移动端迷你播放器 -->
    <div class="mini-player" id="miniPlayer">
        <img src="https://picsum.photos/seed/sad-default/60/60" alt="" class="mini-cover" id="miniCover">
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">未播放</div>
            <div class="mini-artist" id="miniArtist">-</div>
        </div>
        <button class="mini-play" id="miniPlayBtn">▶</button>
    </div>

    <!-- 音频核心 -->
    <audio id="audioPlayer" crossorigin="anonymous">

    <!-- JS按顺序引入 -->
    <script src="js/playlist.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
