<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE · 电音空间站 | 300首DJ舞曲精选</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景动态粒子层 -->
    <div class="bg-particles" id="particles"></div>
    
    <!-- 渐变光晕背景 -->
    <div class="bg-glow">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <!-- 顶部导航 -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">◉</span>
                <span class="logo-text">PULSE</span>
                <span class="logo-sub">DJ STATION</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">首页</a>
                <a href="#" class="nav-item">歌单</a>
                <a href="#" class="nav-item">排行榜</a>
                <a href="#" class="nav-item">分类</a>
                <a href="#" class="nav-item">关于</a>
            </nav>
            <div class="nav-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索歌曲 / 艺人 / 风格...">
                    <span class="search-icon">⌕</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="main-container">
        <!-- 左侧：歌曲列表 -->
        <section class="music-list-section">
            <div class="section-header">
                <h2>🔥 精选电音 300 首</h2>
                <div class="filter-tabs">
                    <button class="tab-btn active" data-filter="all">全部</button>
                    <button class="tab-btn" data-filter="edm">EDM</button>
                    <button class="tab-btn" data-filter="house">House</button>
                    <button class="tab-btn" data-filter="techno">Techno</button>
                    <button class="tab-btn" data-filter="trance">Trance</button>
                    <button class="tab-btn" data-filter="dubstep">Dubstep</button>
                </div>
            </div>
            
            <div class="list-stats">
                <span id="totalCount">共 300 首歌曲</span>
                <span class="play-all-btn" id="playAllBtn">▶ 全部播放</span>
            </div>

            <div class="music-list" id="musicList">
                <!-- 歌曲列表由JS动态生成 -->
            </div>
        </section>

        <!-- 右侧：播放器 + 可视化 -->
        <aside class="player-section">
            <!-- 专辑封面旋转效果 -->
            <div class="cover-container">
                <div class="cover-disc" id="coverDisc">
                    <div class="cover-image" id="coverImage">
                        <img src="https://picsum.photos/seed/dj1/400/400" alt="album cover" id="coverImg">
                    </div>
                    <div class="cover-center"></div>
                </div>
                <div class="cover-ring ring-1"></div>
                <div class="cover-ring ring-2"></div>
                <div class="cover-ring ring-3"></div>
            </div>

            <!-- 歌曲信息 -->
            <div class="song-info">
                <h1 class="song-title" id="songTitle">选择一首歌曲开始播放</h1>
                <p class="song-artist" id="songArtist">--</p>
                <div class="song-tags" id="songTags"></div>
            </div>

            <!-- 音频可视化画布 -->
            <div class="visualizer-container">
                <canvas id="visualizer"></canvas>
            </div>

            <!-- 进度条 -->
            <div class="progress-section">
                <span class="time current" id="currentTime">00:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <span class="time total" id="totalTime">00:00</span>
            </div>

            <!-- 控制按钮 -->
            <div class="controls">
                <button class="ctrl-btn mode-btn" id="modeBtn" title="播放模式">🔁</button>
                <button class="ctrl-btn prev-btn" id="prevBtn">⏮</button>
                <button class="ctrl-btn play-btn" id="playBtn">▶</button>
                <button class="ctrl-btn next-btn" id="nextBtn">⏭</button>
                <button class="ctrl-btn volume-btn" id="volumeBtn">🔊</button>
            </div>

            <!-- 音量控制 -->
            <div class="volume-section">
                <div class="volume-bar" id="volumeBar">
                    <div class="volume-fill" id="volumeFill"></div>
                    <div class="volume-thumb" id="volumeThumb"></div>
                </div>
            </div>

            <!-- 均衡器预设 -->
            <div class="eq-presets">
                <span class="eq-label">音效</span>
                <button class="eq-btn active" data-eq="default">默认</button>
                <button class="eq-btn" data-eq="bass">重低音</button>
                <button class="eq-btn" data-eq="vocal">人声增强</button>
                <button class="eq-btn" data-eq="rock">摇滚</button>
            </div>
        </aside>
    </main>

    <!-- 底部播放条（移动端固定） -->
    <div class="mini-player" id="miniPlayer">
        <div class="mini-cover">
            <img src="https://picsum.photos/seed/dj1/100/100" alt="" id="miniCover">
        </div>
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">未播放</div>
            <div class="mini-artist" id="miniArtist">--</div>
        </div>
        <div class="mini-controls">
            <button id="miniPrev">⏮</button>
            <button id="miniPlay">▶</button>
            <button id="miniNext">⏭</button>
        </div>
    </div>

    <!-- 音频元素 -->
    <audio id="audioPlayer" crossorigin="anonymous">

    <!-- JS文件 -->
    <script src="js/musicData.js"></script>
    <script src="js/visualization.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
