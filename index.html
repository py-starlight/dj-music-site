<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Beat - 沉浸式 DJ 音乐站</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景粒子层 -->
    <div class="bg-particles" id="particles"></div>
    
    <!-- 主容器 -->
    <div class="container">
        <!-- 顶部导航 -->
        <header class="navbar">
            <div class="logo">
                <span class="logo-icon">♫</span>
                <span class="logo-text">NEON BEAT</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">推荐</a>
                <a href="#" class="nav-item">歌单</a>
                <a href="#" class="nav-item">DJ榜单</a>
                <a href="#" class="nav-item">分类</a>
            </nav>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索舞曲 / DJ...">
                <button class="search-btn">🔍</button>
            </div>
        </header>

        <!-- 主体区域 -->
        <main class="main-content">
            <!-- 左侧歌单列表 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3>热门歌单</h3>
                    <span class="song-count" id="totalCount">0 首</span>
                </div>
                <div class="playlist-tabs">
                    <button class="tab-btn active" data-tab="all">全部</button>
                    <button class="tab-btn" data-tab="edm">EDM</button>
                    <button class="tab-btn" data-tab="house">House</button>
                    <button class="tab-btn" data-tab="trance">Trance</button>
                    <button class="tab-btn" data-tab="bass">Bass</button>
                </div>
                <div class="playlist-container" id="playlist">
                    <!-- 歌曲列表由JS渲染 -->
                </div>
            </aside>

            <!-- 中间播放器区域 -->
            <section class="player-section">
                <!-- 专辑封面 + 可视化 -->
                <div class="album-wrapper">
                    <div class="album-cover" id="albumCover">
                        <img src="https://picsum.photos/seed/dj1/400/400" alt="专辑封面" id="coverImg">
                        <div class="cover-glow"></div>
                    </div>
                    <canvas class="visualizer-canvas" id="visualizer"></canvas>
                </div>

                <!-- 歌曲信息 -->
                <div class="song-info">
                    <h1 class="song-title" id="songTitle">选择一首舞曲开始</h1>
                    <p class="song-artist" id="songArtist">Neon Beat Music</p>
                </div>

                <!-- 进度条 -->
                <div class="progress-section">
                    <span class="time current-time" id="currentTime">00:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                        <div class="progress-handle" id="progressHandle"></div>
                    </div>
                    <span class="time total-time" id="totalTime">00:00</span>
                </div>

                <!-- 控制按钮 -->
                <div class="controls">
                    <button class="ctrl-btn mode-btn" id="modeBtn" title="播放模式">🔁</button>
                    <button class="ctrl-btn prev-btn" id="prevBtn" title="上一首">⏮</button>
                    <button class="ctrl-btn play-btn" id="playBtn" title="播放/暂停">▶</button>
                    <button class="ctrl-btn next-btn" id="nextBtn" title="下一首">⏭</button>
                    <button class="ctrl-btn volume-btn" id="volumeBtn" title="音量">🔊</button>
                </div>

                <!-- 音量滑块 -->
                <div class="volume-section">
                    <input type="range" id="volumeSlider" min="0" max="100" value="70" class="volume-slider">
                </div>
            </section>

            <!-- 右侧歌词/信息区 -->
            <aside class="info-panel">
                <div class="panel-tabs">
                    <button class="panel-tab active" data-panel="lyric">歌词</button>
                    <button class="panel-tab" data-panel="info">歌曲信息</button>
                    <button class="panel-tab" data-panel="similar">相似推荐</button>
                </div>
                <div class="panel-content" id="panelContent">
                    <div class="lyric-container">
                        <p class="lyric-placeholder">纯音乐舞曲 · 享受节奏</p>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- 底部固定播放器（移动端） -->
    <div class="mini-player" id="miniPlayer">
        <img src="https://picsum.photos/seed/dj1/60/60" alt="" class="mini-cover" id="miniCover">
        <div class="mini-info">
            <div class="mini-title" id="miniTitle">未播放</div>
            <div class="mini-artist" id="miniArtist">-</div>
        </div>
        <button class="mini-play" id="miniPlayBtn">▶</button>
    </div>

    <!-- 音频元素 -->
    <audio id="audioPlayer" crossorigin="anonymous">

    <!-- JS脚本 -->
    <script src="js/playlist.js"></script>
    <script src="js/visualizer.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
